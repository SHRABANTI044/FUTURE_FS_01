<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shrabanti Saha - Resume</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .resume-container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            max-width: 800px;
            width: 100%;
        }
        .resume-image {
            width: 100%;
            height: auto;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .download-btn {
            background: #007bff;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 20px;
            text-decoration: none;
            display: inline-block;
        }
        .download-btn:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>
    <div class="resume-container">
        <h1>Shrabanti Saha - Resume</h1>
        <!-- Add your resume image here -->
        <img src="resume-image.jpg" alt="Shrabanti Saha Resume" class="resume-image" id="resumeImage">
        
        <div style="margin-top: 20px;">
            <button onclick="downloadAsPDF()" class="download-btn">Download as PDF</button>
            <a href="resume-image.jpg" download="Shrabanti_Saha_Resume.jpg" class="download-btn" style="margin-left: 10px;">Download Image</a>
        </div>
    </div>

    <script>
        function downloadAsPDF() {
            // This will help convert to PDF
            window.print();
        }
    </script>
</body>
</html>
